suite: test archestra platform -- ServiceAccount/Role/RoleBinding
templates:
  - serviceaccount.yaml
tests:
  # ServiceAccount tests
  - it: should create a ServiceAccount by default
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform$

  - it: should not create ServiceAccount when create is false
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4  # MCP Role + MCP RoleBinding + Connector Role + Connector RoleBinding

  - it: should use custom ServiceAccount name when provided
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: "custom-sa-name"

  - it: should add custom annotations to ServiceAccount
    set:
      archestra.orchestrator.kubernetes.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/my-role"
        custom-annotation: "custom-value"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: "custom-value"

  - it: should not have imagePullSecrets when not configured
    documentIndex: 0
    asserts:
      - isNull:
          path: imagePullSecrets

  - it: should add imagePullSecrets to ServiceAccount when configured
    set:
      archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets:
        - name: myregistrykey
        - name: anotherregistrykey
    documentIndex: 0
    asserts:
      - equal:
          path: imagePullSecrets[0].name
          value: myregistrykey
      - equal:
          path: imagePullSecrets[1].name
          value: anotherregistrykey

  # MCP Manager Role tests
  - it: should create a MCP Manager Role by default
    documentIndex: 1
    asserts:
      - isKind:
          of: Role
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-mcp-manager$

  - it: should not create Role when rbac.create is false
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1  # Only ServiceAccount should be created

  - it: should have correct pod permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have pod/exec permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/exec"]
            verbs: ["get", "create"]

  - it: should have pod/log permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/log"]
            verbs: ["get", "list"]

  - it: should have pod/attach permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/attach"]
            verbs: ["get", "create"]

  - it: should have services permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have secrets permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have deployments permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should NOT have batch/cronjobs permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["cronjobs", "jobs"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  # MCP Manager RoleBinding tests
  - it: should create a MCP Manager RoleBinding by default
    documentIndex: 2
    asserts:
      - isKind:
          of: RoleBinding
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-mcp-manager$

  - it: should not create MCP Manager RoleBinding when rbac.create is false
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1  # Only ServiceAccount should be created

  - it: MCP Manager RoleBinding should bind to the correct ServiceAccount
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - matchRegex:
          path: subjects[0].name
          pattern: -archestra-platform$
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE

  - it: MCP Manager RoleBinding should bind to custom ServiceAccount name
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-sa-name"

  - it: MCP Manager RoleBinding should reference the correct Role
    documentIndex: 2
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
      - matchRegex:
          path: roleRef.name
          pattern: -archestra-platform-mcp-manager$
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io

  # Connector Manager Role tests
  - it: should create a Connector Manager Role by default
    documentIndex: 3
    asserts:
      - isKind:
          of: Role
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-connector-manager$

  - it: Connector Manager Role should be in default connector namespace
    documentIndex: 3
    asserts:
      - equal:
          path: metadata.namespace
          value: archestra-connectors

  - it: Connector Manager Role should be in custom connector namespace
    set:
      archestra.env.ARCHESTRA_KNOWLEDGE_BASE_CONNECTOR_K8S_CRONJOB_NAMESPACE: "my-connectors"
    documentIndex: 3
    asserts:
      - equal:
          path: metadata.namespace
          value: my-connectors

  - it: Connector Manager Role should have batch, pod, and pod/log permissions
    documentIndex: 3
    asserts:
      - lengthEqual:
          path: rules
          count: 3
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["cronjobs", "jobs"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list"]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/log"]
            verbs: ["get", "list"]

  - it: Connector Manager Role should NOT have full pod CRUD permissions
    documentIndex: 3
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  # Connector Manager RoleBinding tests
  - it: should create a Connector Manager RoleBinding by default
    documentIndex: 4
    asserts:
      - isKind:
          of: RoleBinding
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-connector-manager$

  - it: Connector Manager RoleBinding should be in default connector namespace
    documentIndex: 4
    asserts:
      - equal:
          path: metadata.namespace
          value: archestra-connectors

  - it: Connector Manager RoleBinding should be in custom connector namespace
    set:
      archestra.env.ARCHESTRA_KNOWLEDGE_BASE_CONNECTOR_K8S_CRONJOB_NAMESPACE: "my-connectors"
    documentIndex: 4
    asserts:
      - equal:
          path: metadata.namespace
          value: my-connectors

  - it: Connector Manager RoleBinding should bind to ServiceAccount in release namespace
    documentIndex: 4
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - matchRegex:
          path: subjects[0].name
          pattern: -archestra-platform$
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE

  - it: Connector Manager RoleBinding should bind to custom ServiceAccount name
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
    documentIndex: 4
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-sa-name"

  - it: Connector Manager RoleBinding should reference the Connector Manager Role
    documentIndex: 4
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
      - matchRegex:
          path: roleRef.name
          pattern: -archestra-platform-connector-manager$
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io

  # Integration tests
  - it: should create all resources with default values
    asserts:
      - hasDocuments:
          count: 5

  - it: should create only ServiceAccount when RBAC is disabled
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should create only RBAC resources when ServiceAccount is disabled
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4

  - it: should create no resources when both are disabled
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should work with all custom configurations
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-archestra-sa"
      archestra.orchestrator.kubernetes.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/archestra-role"
      archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets:
        - name: private-registry-secret
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: "custom-archestra-sa"
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/archestra-role"
      - equal:
          path: imagePullSecrets[0].name
          value: private-registry-secret

  - it: should ensure MCP Manager RoleBinding references custom ServiceAccount
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-archestra-sa"
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-archestra-sa"

  - it: should ensure Connector Manager RoleBinding references custom ServiceAccount
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-archestra-sa"
    documentIndex: 4
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-archestra-sa"

  - it: custom connector namespace should apply to both Role and RoleBinding
    set:
      archestra.env.ARCHESTRA_KNOWLEDGE_BASE_CONNECTOR_K8S_CRONJOB_NAMESPACE: "prod-connectors"
    asserts:
      - equal:
          path: metadata.namespace
          value: prod-connectors
        documentIndex: 3
      - equal:
          path: metadata.namespace
          value: prod-connectors
        documentIndex: 4
